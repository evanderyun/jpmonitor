
services:
  postgres:
    image: postgres:16-alpine
    container_name: jpmonitor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: jpmonitor_db
      POSTGRES_USER: jpmonitor_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:jpmonitor_password}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:5436:5432"
    volumes:
      - jpmonitor-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jpmonitor_user -d jpmonitor_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jpmonitor-net

  backend:
    build:
      context: ./backend-java
      dockerfile: Dockerfile
    container_name: jpmonitor-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/jpmonitor_db
      SPRING_DATASOURCE_USERNAME: jpmonitor_user
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:jpmonitor_password}
      JWT_SECRET: ${JWT_SECRET}
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173,https://your-domain.example.com
      SPRING_PROFILES_ACTIVE: production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - jpmonitor-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: /api
    container_name: jpmonitor-frontend
    restart: unless-stopped
    depends_on:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:3002:80"
    networks:
      - jpmonitor-net

volumes:
  jpmonitor-pgdata:

networks:
  jpmonitor-net:
    driver: bridge
