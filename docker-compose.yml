version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: jpm-erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: jpm_db
      POSTGRES_USER: jpm_user
      POSTGRES_PASSWORD: JpmErpDbPass2026Secure!
    ports:
      - "127.0.0.1:5436:5432"
    volumes:
      - jpm-erp-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jpm_user -d jpm_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jpm-erp-net

  backend:
    build:
      context: ./backend-java
      dockerfile: Dockerfile
    container_name: jpm-erp-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/jpm_db
      SPRING_DATASOURCE_USERNAME: jpm_user
      SPRING_DATASOURCE_PASSWORD: JpmErpDbPass2026Secure!
      JWT_SECRET: ${JWT_SECRET}
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost
      SPRING_PROFILES_ACTIVE: production
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - jpm-erp-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: /api
    container_name: jpm-erp-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3002:80"
    networks:
      - jpm-erp-net

volumes:
  jpm-erp-pgdata:

networks:
  jpm-erp-net:
    driver: bridge
