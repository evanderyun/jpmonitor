server:
  port: 8080

spring:
  application:
    name: jpm-erp-backend
  
  # Java 21 Virtual Threads (Project Loom) - HIGH PERFORMANCE
  threads:
    virtual:
      enabled: true
  
  jackson:
    property-naming-strategy: SNAKE_CASE

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:jpm_db}
    username: ${DB_USER:jpm_user}
    password: ${DB_PASSWORD:jpm_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      pool-name: JpmHikariCP

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none  # Let Flyway handle schema management
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        physical_naming_strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
        implicit_naming_strategy: org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy
        format_sql: true
    show-sql: true
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true  # Handle existing database
    locations: classpath:db/migration
    schemas: public

  # Security Configuration (JWT)
  security:
    oauth2:
      resourceserver:
        jwt:
          # In a real scenario, use RS256 keys. For migration start, we can use a symmetric key or mock.
          # For now, we will set up the structure.
          issuer-uri: https://jpm-erp.com

logging:
  level:
    root: INFO
    com.jpm.erp: DEBUG
    org.hibernate.SQL: INFO
    org.springframework.security: INFO
